<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaShop - E-Commerce Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">🛍️ RifkiShop</div>
            <nav class="navbar">
                <a href="#home">Home</a>
                <a href="#products">Products</a>
                <a href="#cart" class="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</a>
            </nav>
        </div>
    </header>

    <!-- Search & Filter -->
    <section class="search-section">
        <div class="container">
            <input 
                type="text" 
                id="search-input" 
                placeholder="Cari produk..." 
                class="search-bar"
            >
            <select id="category-filter" class="filter-dropdown">
                <option value="">Semua Kategori</option>
                <option value="electronics">Electronics</option>
                <option value="fashion">Fashion</option>
                <option value="books">Books</option>
                <option value="home">Home & Garden</option>
            </select>
        </div>
    </section>

    <!-- Products Section -->
    <section id="products" class="products-section">
        <div class="container">
            <h2>Produk Kami</h2>
            <div id="products-grid" class="products-grid">
                <!-- Produk akan ditampilkan di sini via JavaScript -->
            </div>
        </div>
    </section>

    <!-- Shopping Cart Modal -->
    <section id="cart" class="cart-modal" style="display: none;">
        <div class="cart-content">
            <span class="close-btn" onclick="closeCart()">&times;</span>
            <h2>Shopping Cart</h2>
            <div id="cart-items" class="cart-items">
                <!-- Item cart ditampilkan di sini -->
            </div>
            <div class="cart-footer">
                <p>Total: Rp <span id="total-price">0</span></p>
                <button class="checkout-btn">Checkout</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
